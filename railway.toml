[build]
builder = "railpack"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter backend build"

[deploy]
startCommand = "node apps/backend/dist/main"
healthcheckPath = "/api"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Migrations are run via Railway dashboard → "Pre-deploy Command":
# cd apps/backend && pnpm migration:run:prod

[environments.production.deploy]
numReplicas = 1
